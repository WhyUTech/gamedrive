    let selected = [];

    // Fungsi-fungsi (sama seperti sebelumnya)
    function renderGames(filteredGames) {
      const container = document.getElementById('games');
      container.innerHTML = '';
      filteredGames.forEach(game => {
        const div = document.createElement('div');
        div.className = 'game-item';
        div.innerHTML = `
          <img src="${game.image}" alt="${game.name}">
          <div style="flex:1;">
            <span>${game.name}</span><br>
            <strong>${game.size} GB</strong>
          </div>
          <button class="add-btn" onclick="addGame(${game.id})">Tambah</button>
        `;
        container.appendChild(div);
      });
    }

    function addGame(id) {
      const game = games.find(g => g.id === id);
      if (selected.find(s => s.id === id)) return alert(game.name + " sudah ditambahkan!");
      selected.push(game);
      renderSelected();
    }

    function removeGame(id) {
      selected = selected.filter(g => g.id !== id);
      renderSelected();
    }

    function renderSelected() {
      const container = document.getElementById('selected');
      container.innerHTML = '';
      selected.forEach(game => {
        const div = document.createElement('div');
        div.className = 'game-item';
        div.innerHTML = `
          <img src="${game.image}" alt="${game.name}">
          <div style="flex:1;">
            <span>${game.name}</span><br>
            <strong>${game.size} GB</strong>
          </div>
          <button class="remove-btn" onclick="removeGame(${game.id})">Hapus</button>
        `;
        container.appendChild(div);
      });

      const total = selected.reduce((sum, g) => sum + g.size, 0);
      document.getElementById('total-size').textContent = total.toFixed(1);
      document.getElementById('count').textContent = selected.length;
    }

    function generateOutput() {
      if (selected.length === 0) return alert("Belum ada game yang dipilih!");
      const total = selected.reduce((sum, g) => sum + g.size, 0).toFixed(1);
      let text = `Why_UTech List Game :\n`;
      text += `Total Pesanan ${total}GB\n\n`;
      selected.forEach((game, index) => {
        text += `${index + 1}. ${game.name} ${game.size}GB\n`;
      });
      document.getElementById('outputText').textContent = text;
      document.getElementById('outputSection').style.display = 'block';
    }

    function copyToClipboard() {
      const text = document.getElementById('outputText').textContent;
      navigator.clipboard.writeText(text).then(() => alert("✅ Berhasil dicopy!"));
    }

    function downloadTxt() {
      const text = document.getElementById('outputText').textContent;
      const blob = new Blob([text], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'Why_UTech_List_Game.txt';
      a.click();
    }

    function clearAll() {
      if (confirm("Hapus semua pilihan?")) {
        selected = [];
        renderSelected();
        document.getElementById('outputSection').style.display = 'none';
      }
    }

    function filterGames() {
      const term = document.getElementById('search').value.toLowerCase();
      const filtered = games.filter(g => g.name.toLowerCase().includes(term));
      renderGames(filtered);
    }

    // Inisialisasi
    renderGames(games);
    renderSelected();
  </script>
